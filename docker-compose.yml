services:
  bot:
    build: .
    volumes:
      - ./DownloadTests:/app/DownloadTests
      - ./logs:/app/logs
      - .env:/app/.env
    depends_on:
      - telegram-bot-api
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
    restart: always

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    volumes:
      - telegram-bot-data:/var/lib/telegram-bot-api
    command: --local --api-id=${TELEGRAM_API_ID} --api-hash=${TELEGRAM_API_HASH}
    restart: always

volumes:
  telegram-bot-data:
